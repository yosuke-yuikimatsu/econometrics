version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  bootstrap:
    build: .
    command: ["python", "-m", "app.cli", "bootstrap"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker_bootstrap:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "bootstrap", "-n", "bootstrap@%h", "-l", "INFO", "--concurrency=1"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker_fetch:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "fetch", "-n", "fetch@%h", "-l", "INFO", "--concurrency=4"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker_parse:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "parse", "-n", "parse@%h", "-l", "INFO", "--concurrency=4"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker_aggregate:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "aggregate", "-n", "aggregate@%h", "-l", "INFO", "--concurrency=1"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  monitor:
    build: .
    command: ["python", "-m", "app.cli", "summary", "--watch"]
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
    profiles: ["monitor"]

volumes:
  redis_data:
