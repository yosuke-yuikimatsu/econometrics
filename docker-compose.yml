version: "3.9"

services:
  redis:
    image: redis:7.4-alpine
    command:
      [
        "redis-server",
        "--appendonly", "no",
        "--save", "",
        "--maxmemory", "4gb",
        "--maxmemory-policy", "noeviction"
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cbr_reports
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_SHARED_BUFFERS: 8GB           
      POSTGRES_EFFECTIVE_CACHE_SIZE: 24GB    
      POSTGRES_WORK_MEM: 64MB               
      POSTGRES_MAINTENANCE_WORK_MEM: 1GB     
      POSTGRES_MAX_CONNECTIONS: 100         
      POSTGRES_WAL_BUFFERS: 256MB
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cbr_reports"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  bootstrap:
    build: .
    command: ["python", "-m", "app.cli", "bootstrap"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}

  worker_bootstrap:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "bootstrap", "-n", "bootstrap@%h", "-l", "INFO", "--concurrency=1"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}

  worker_fetch:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "fetch", "-n", "fetch@%h", "-l", "INFO", "--concurrency=12"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}

  worker_parse:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "parse", "-n", "parse@%h", "-l", "INFO", "--concurrency=8"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}

  worker_aggregate:
    build: .
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "aggregate", "-n", "aggregate@%h", "-l", "INFO", "--concurrency=1"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}

  monitor:
    build: .
    command: ["python", "-m", "app.cli", "summary", "--watch"]
    env_file: [.env]
    volumes: ["./data:/app/data"]
    depends_on:
      redis: {condition: service_started}
      postgres: {condition: service_healthy}
    profiles: ["monitor"]

volumes:
  redis_data:
  postgres_data:
